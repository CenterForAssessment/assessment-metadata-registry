name: R-CMD-check

# Tier C gate for the amrr consumption package. Paths-filtered to r-pkg/** so it stays
# dormant until the package lands (Phase 3), then runs on every change to it.
# Standard r-lib/actions pipeline; matrix kept small (add macOS/Windows when stabilizing).

on:
  push:
    branches: [main]
    paths:
      - "r-pkg/**"
      - ".github/workflows/R-CMD-check.yml"
  pull_request:
    paths:
      - "r-pkg/**"
      - ".github/workflows/R-CMD-check.yml"
  workflow_dispatch:

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest, r: "release" }
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    defaults:
      run:
        working-directory: r-pkg/amrr
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check
          working-directory: r-pkg/amrr

      # man/ is generated from roxygen comments (not committed) so the check sees
      # documented exports.
      - name: Document
        run: Rscript -e 'roxygen2::roxygenise()'
        working-directory: r-pkg/amrr

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          working-directory: r-pkg/amrr
