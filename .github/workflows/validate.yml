name: validate-metadata

# Tier A gate: every authored sidecar must pass JSON Schema + registry invariants.
# A malformed or identity-inconsistent sidecar blocks the merge.

on:
  push:
    branches: [main]
    paths:
      - "metadata/**"
      - "schemas/**"
      - "r-pkg/amrr/**"
      - ".github/workflows/validate.yml"
  # No paths filter on PRs: validate runs on every pull request so it can serve as a
  # required status check without the paths-filter deadlock (a required check that never
  # runs blocks the PR). Full-corpus validation is quick and always meaningful.
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::jsonvalidate
      - name: Install amrr
        run: R CMD INSTALL --no-docs r-pkg/amrr
      - name: Validate sidecars
        run: Rscript -e 'amrr::validate_registry(".")'
