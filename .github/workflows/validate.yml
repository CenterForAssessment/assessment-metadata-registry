name: validate-metadata

# Tier A gate: every authored sidecar must pass JSON Schema + registry invariants.
# A malformed or identity-inconsistent sidecar blocks the merge.

on:
  push:
    branches: [main]
    paths:
      - "metadata/**"
      - "schemas/**"
      - "tools/validate.py"
      - "tools/requirements.txt"
      - ".github/workflows/validate.yml"
  # No paths filter on PRs: validate runs on every pull request so it can serve as a
  # required status check without the paths-filter deadlock (a required check that never
  # runs blocks the PR). The full-corpus validation is fast (~8s) and always meaningful.
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: python -m pip install -r tools/requirements.txt
      - name: Validate sidecars
        run: python tools/validate.py
