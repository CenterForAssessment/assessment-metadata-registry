name: build-publish

# Tier B: on merge to main, validate -> derive -> publish SHA-stamped static bundles to
# GitHub Pages. The published artifacts (index, per-jurisdiction bundles, changelog,
# tables, sqlite) are what amrr::get_metadata() fetches. Because the build stamps the
# commit SHA into every bundle, a consumer that pins to a SHA can prove which bytes it used.

on:
  push:
    branches: [main]
    paths:
      - "metadata/**"
      - "schemas/**"
      - "r-pkg/amrr/**"
      - ".github/workflows/build-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::jsonlite
            any::jsonvalidate
            any::DBI
            any::RSQLite
            any::digest
      - name: Install amrr
        run: R CMD INSTALL --no-docs r-pkg/amrr
      - name: Validate (Tier A gate)
        run: Rscript -e 'amrr::validate_registry(".")'
      - name: Build derived layer (Tier B)
        run: Rscript -e 'amrr::build_registry(".", out = "build")'
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build
      - id: deploy
        uses: actions/deploy-pages@v5
